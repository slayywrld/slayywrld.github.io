<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topkidslayy's Badges</title>
<link rel="stylesheet" href="stylesheets/style2.css">
<link rel="icon" href="images/favicon.png" type="image/x-icon">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
  <div id="particles-js"></div>
  <div class="container">
    <header class="header">
      <h1>Topkidslayy's Badges</h1>
    </header>
    <section id="badges" class="section">
      <h3>Badges</h3>
      <div class="badges-container">
        <!-- HackTheBox badges -->
        <a href="https://academy.hackthebox.com/achievement/badge/2520153d-eb12-11ee-b18d-bea50ffe6cb4" target="_blank" class="badge-link">
          <div class="badge-square">
            <img src="images/philomath.png" alt="HackTheBox Badge" class="badge-image">

        </a>
        <a href="https://academy.hackthebox.com/achievement/badge/a744d476-c408-11ed-acfc-bea50ffe6cb4" target="_blank" class="badge-link">
          <div class="badge-square">
            <img src="images/academician.png" alt="HackTheBox Badge" class="badge-image">
          </div>
        </a>
        <a href="https://academy.hackthebox.com/achievement/badge/4dbc395b-dad4-11ed-acfc-bea50ffe6cb4" target="_blank" class="badge-link">
          <div class="badge-square">
            <img src="images/our-favorite-seabird.png" alt="HackTheBox Badge" class="badge-image">
          </div>
        </a>
        <a href="https://academy.hackthebox.com/achievement/badge/42e81a73-aec4-11ee-bfb6-bea50ffe6cb4" target="_blank" class="badge-link">
          <div class="badge-square">
            <img src="images/your-first-battle.png" alt="HackTheBox Badge" class="badge-image">
          </div>
        </a>
        <a href="https://academy.hackthebox.com/achievement/badge/ba93f1e9-c408-11ed-acfc-bea50ffe6cb4" target="_blank" class="badge-link">
          <div class="badge-square">
            <img src="images/start-building-your-arsenal.png" alt="HackTheBox Badge" class="badge-image">
          </div>
        </a>
        <a href="https://academy.hackthebox.com/achievement/badge/33c0bc3d-afd2-11ee-bfb6-bea50ffe6cb4" target="_blank" class="badge-link">
          <div class="badge-square">
            <img src="images/logo.png" alt="HackTheBox Badge" class="badge-image">
          </div>
        </a>
        <a href="https://academy.hackthebox.com/achievement/badge/514b01ef-99af-11ee-bfb6-bea50ffe6cb4" target="_blank" class="badge-link">
          <div class="badge-square">
            <img src="images/logo1.png" alt="HackTheBox Badge" class="badge-image">
          </div>
        </a>
      </div>
    </section>
    <footer class="footer">
      <div class="social-icons-container"> <!-- Replace YOUR_SOCIAL_LINK_HERE with your actual link -->
        <div class="social-icons-border"></div>
        <a href="https://github.com/slayywrld" target="_blank" class="social-icon"><i class="fab fa-github"></i></a>
        <a href="https://www.instagram.com/topkidslayy/" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
        <a href="https://discord.gg/c96pFJRQMP" target="_blank" class="social-icon"><i class="fab fa-discord"></i></a>
        <a href="https://www.linkedin.com/in/topkidslayy/" target="_blank" class="social-icon"><i class="fab fa-linkedin"></i></a>
        <div class="social-icons-border"></div>
      </div>
    </footer>
  </div>

  <script>
  particlesJS("particles-js", {
    "particles": {
      "number": {
        "value": 80,
        "density": {
          "enable": true,
          "value_area": 800
        }
      },
      "color": {
        "value": "#9ee901"
      },
      "shape": {
        "type": "circle",
        "stroke": {
          "width": 0,
          "color": "#000000"
        },
        "polygon": {
          "nb_sides": 5
        },
        "image": {
          "src": "img/github.svg",
          "width": 100,
          "height": 100
        }
      },
      "opacity": {
        "value": 0.5,
        "random": true,
        "anim": {
          "enable": false,
          "speed": 1,
          "opacity_min": 0.1,
          "sync": false
        }
      },
      "size": {
        "value": 3,
        "random": true,
        "anim": {
          "enable": false,
          "speed": 40,
          "size_min": 0.1,
          "sync": false
        }
      },
      "line_linked": {
        "enable": true,
        "distance": 150,
        "color": "#9ee901",
        "opacity": 0.4,
        "width": 1
      },
      "move": {
        "enable": true,
        "speed": 6,
        "direction": "none",
        "random": false,
        "straight": false,
        "out_mode": "out",
        "bounce": false,
        "attract": {
          "enable": false,
          "rotateX": 600,
          "rotateY": 1200
        }
      }
    },
    "interactivity": {
      "detect_on": "canvas",
      "events": {
        "onhover": {
          "enable": true,
          "mode": "repulse"
        },
        "onclick": {
          "enable": true,
          "mode": "push"
        },
        "resize": true
      },
      "modes": {
        "grab": {
          "distance": 400,
          "line_linked": {
            "opacity": 1
          }
        },
        "bubble": {
          "distance": 400,
          "size": 40,
          "duration": 2,
          "opacity": 8,
          "speed": 3
        },
        "repulse": {
          "distance": 200,
          "duration": 0.4
        },
        "push": {
          "particles_nb": 4
        },
        "remove": {
          "particles_nb": 2
        }
      }
    },
    "retina_detect": true
  });
</script>
  
</body>
</html>
